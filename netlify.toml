[build]
  publish = "."

# Block .bak files from public access
[[redirects]]
  from = "/*.bak"
  to = "/404"
  status = 404
  force = true

# Block scripts/ directory from public access
[[redirects]]
  from = "/scripts/*"
  to = "/404"
  status = 404
  force = true

# Block node_modules/ from public access
[[redirects]]
  from = "/node_modules/*"
  to = "/404"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://tiles.openfreemap.org https://*.openfreemap.org; worker-src 'self' blob:; frame-ancestors 'none';"
